<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#11140f">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<title>Inn Reader — read &amp; listen</title>
<style>
  :root{
    --bg:#11140f; --panel:#1a1e16; --ink:#e9e6da; --dim:#8d927f;
    --warm:#e7b75f; --warm-soft:#3a3320; --line:#2a2f24; --tap:#222a1c;
    --read: 1.55rem; --lh: 1.85;
  }
  @media (prefers-color-scheme: light){
    :root{ --bg:#f6f3ea; --panel:#fffdf6; --ink:#23251d; --dim:#6c6f5e;
           --warm:#9a6b14; --warm-soft:#f0e3c4; --line:#e4ddc8; --tap:#efe9d8; }
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    background:var(--bg); color:var(--ink);
    font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,serif;
    display:flex; flex-direction:column; height:100dvh; overflow:hidden;
  }
  /* ---- load screen ---- */
  #load{flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center;
        gap:18px; padding:28px; text-align:center; overflow-y:auto;}
  #load h1{font:600 1.5rem/1.2 Georgia,serif; margin:0 0 4px;}
  #load p{color:var(--dim); margin:0; max-width:30ch; font-size:.95rem;}
  .pick{display:flex; flex-direction:column; gap:12px; width:min(420px,100%); margin-top:8px;}
  .btn{appearance:none; border:1px solid var(--line); background:var(--panel); color:var(--ink);
       padding:15px 16px; border-radius:14px; font-size:1rem; text-align:left; display:flex;
       align-items:center; gap:12px; cursor:pointer;}
  .btn small{display:block; color:var(--dim); font-size:.8rem; margin-top:2px;}
  .btn .ck{color:var(--warm); font-weight:700; min-width:1.2em;}
  .btn.primary{background:var(--warm); color:#1a1407; border-color:transparent; justify-content:center; font-weight:600;}
  .btn.primary small{color:#5a4a1e;}
  input[type=file]{display:none;}
  /* ---- top bar (reader) ---- */
  #top{display:none; align-items:center; gap:6px;
       padding:calc(6px + env(safe-area-inset-top)) 10px 6px;
       background:var(--panel); border-bottom:1px solid var(--line);}
  #top.on{display:flex;}
  .tbtn{appearance:none; border:none; background:transparent; color:var(--ink); font-size:1.15rem;
        padding:8px 10px; border-radius:10px; min-width:42px; cursor:pointer; line-height:1;}
  .tbtn:active{background:var(--tap);}
  #nowChap{flex:1; text-align:center; font:600 .9rem/1.2 Georgia,serif; color:var(--dim);
           white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding:0 4px;}
  /* ---- reader ---- */
  #reader{flex:1; position:relative; overflow-y:auto; padding:18px 20px 40vh; display:none; scroll-behavior:smooth;
          -webkit-overflow-scrolling:touch;}
  #reader.on{display:block;}
  #docTitle{font:600 1.15rem/1.3 Georgia,serif; color:var(--dim); margin:6px 2px 20px; letter-spacing:.01em;}
  .chap{font:600 1.08rem/1.3 Georgia,serif; color:var(--warm); margin:1.7em 2px .85em; padding-top:.5em;
        border-top:1px solid var(--line); cursor:pointer;}
  .chap.first{border-top:none; padding-top:0; margin-top:.2em;}
  .seg{display:block; font-size:var(--read); line-height:var(--lh); margin:0 0 1.05em;
       color:var(--dim); transition:color .25s ease; cursor:pointer; font-family:Georgia,"Times New Roman",serif;}
  .seg.read{color:var(--ink);}            /* already heard */
  .seg.cur{color:var(--ink);}             /* current sentence */
  .seg .w{transition:color .1s linear;}
  .seg .w.on{color:var(--warm);}
  .seg.cur{ text-shadow:0 0 0.01px transparent; scroll-margin-top:30vh; }
  /* ---- transport ---- */
  #bar{background:var(--panel); border-top:1px solid var(--line); padding:10px 14px calc(10px + env(safe-area-inset-bottom));
       display:none; flex-direction:column; gap:8px;}
  #bar.on{display:flex;}
  .scrub{display:flex; align-items:center; gap:10px; font-variant-numeric:tabular-nums; color:var(--dim); font-size:.78rem;}
  #seek{flex:1; -webkit-appearance:none; appearance:none; height:4px; border-radius:3px;
        background:var(--line); outline:none;}
  #seek::-webkit-slider-thumb{-webkit-appearance:none; width:18px; height:18px; border-radius:50%; background:var(--warm); cursor:pointer;}
  #seek::-moz-range-thumb{width:18px;height:18px;border:none;border-radius:50%;background:var(--warm);}
  .row{display:flex; align-items:center; justify-content:space-between; gap:6px;}
  .ctrl{appearance:none; border:none; background:transparent; color:var(--ink); font-size:1rem;
        padding:8px; border-radius:10px; cursor:pointer; min-width:46px;}
  .ctrl:active{background:var(--tap);}
  #play{background:var(--warm); color:#1a1407; width:60px; height:60px; border-radius:50%; font-size:1.5rem; min-width:0;}
  .pill{font-size:.8rem; color:var(--dim); border:1px solid var(--line); border-radius:20px; padding:7px 11px; background:transparent;}
  .pill.act{color:var(--warm); border-color:var(--warm);}
  /* ---- bottom sheet (chapters / settings) ---- */
  #scrim{position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; z-index:5;}
  #scrim.on{display:block;}
  #sheet{position:fixed; left:0; right:0; bottom:0; z-index:6; background:var(--panel);
         border-top:1px solid var(--line); border-radius:18px 18px 0 0;
         padding:8px 16px calc(20px + env(safe-area-inset-bottom)); max-height:74vh; overflow-y:auto;
         transform:translateY(110%); transition:transform .22s ease;}
  #sheet.on{transform:translateY(0);}
  .grip{width:38px; height:4px; border-radius:3px; background:var(--line); margin:4px auto 6px;}
  #sheet h2{font:600 1rem/1.2 Georgia,serif; margin:6px 2px 10px; color:var(--ink);}
  #sheet .empty{color:var(--dim); padding:4px 6px 10px;}
  .clist button{display:block; width:100%; text-align:left; background:transparent; border:none;
     border-bottom:1px solid var(--line); color:var(--ink); font:1rem/1.35 Georgia,serif; padding:13px 6px; cursor:pointer;}
  .clist button:last-child{border-bottom:none;}
  .clist button.cur{color:var(--warm);}
  .clist button .ct{color:var(--dim); font-size:.74rem; font-family:-apple-system,sans-serif; float:right; font-variant-numeric:tabular-nums;}
  .srow{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:13px 4px; border-bottom:1px solid var(--line);}
  .srow:last-child{border-bottom:none;}
  .srow .lab{color:var(--ink); font-size:.95rem;}
  .srow .lab small{display:block; color:var(--dim); font-size:.75rem; margin-top:2px;}
  .chips{display:flex; flex-wrap:wrap; gap:6px; justify-content:flex-end;}
  .chip{appearance:none; border:1px solid var(--line); background:transparent; color:var(--ink);
        border-radius:10px; padding:8px 12px; font-size:.9rem; cursor:pointer; min-width:42px;}
  .chip.act{background:var(--warm); color:#1a1407; border-color:transparent; font-weight:600;}
  #toast{position:fixed; left:50%; bottom:calc(96px + env(safe-area-inset-bottom)); transform:translateX(-50%);
     background:rgba(0,0,0,.82); color:#fff; padding:10px 15px; border-radius:11px; font-size:.85rem;
     z-index:8; display:none; max-width:82vw; text-align:center;}
  #toast.on{display:block;}
</style>
</head>
<body>

<section id="load">
  <div>
    <h1>Inn Reader</h1>
    <p>Listen to the narration and read the same words, in sync, on your phone.</p>
  </div>
  <div class="pick">
    <button class="btn primary" id="resumeBtn" style="display:none;">▶ Resume<small id="resumeName"></small></button>
    <button class="btn primary" id="tryDemo">▶ Try the demo<small>A short sample, no files needed</small></button>
    <label class="btn" id="audioBtn"><span class="ck" id="audioCk">○</span><span>Load audio file<small id="audioName">your .mp3 / .m4a chapter or volume</small></span>
      <input type="file" id="audioIn" accept="audio/*,.mp3,.m4a,.m4b,.aac"></label>
    <label class="btn" id="syncBtn"><span class="ck" id="syncCk">○</span><span>Load sync file<small id="syncName">the .json the aligner produced</small></span>
      <input type="file" id="syncIn" accept=".json,application/json"></label>
    <button class="btn" id="startBtn" style="display:none; justify-content:center; font-weight:600;">Open reader →</button>
    <label class="btn" id="bookBtn"><span class="ck">▦</span><span>Load a whole book<small>select all of a book's tracks + their sync files — reads continuously, track to track</small></span>
      <input type="file" id="bookIn" multiple></label>
    <button class="btn" id="dbxBtn"><span class="ck">☁</span><span id="dbxLabel">Load from Dropbox<small id="dbxSmall">stream a book from your Dropbox — no local files</small></span></button>
    <div id="dbxPicker" style="display:none; gap:6px; flex-direction:column;"></div>
  </div>
</section>

<header id="top">
  <button class="tbtn" id="chaptersBtn" title="Chapters" aria-label="Chapters">☰</button>
  <button class="tbtn" id="prevChap" title="Previous chapter" aria-label="Previous chapter">⏮</button>
  <div id="nowChap"></div>
  <button class="tbtn" id="nextChap" title="Next chapter" aria-label="Next chapter">⏭</button>
  <button class="tbtn" id="settingsBtn" title="Display &amp; timer" aria-label="Settings">Aa</button>
</header>

<main id="reader"></main>

<footer id="bar">
  <div class="scrub"><span id="cur">0:00</span>
    <input type="range" id="seek" min="0" max="1000" value="0">
    <span id="dur">0:00</span></div>
  <div class="row">
    <button class="ctrl" id="back">↺15</button>
    <button class="pill" id="rate">1×</button>
    <button class="ctrl" id="play">▶</button>
    <button class="pill act" id="follow">Follow</button>
    <button class="ctrl" id="fwd">15↻</button>
  </div>
</footer>

<div id="scrim"></div>
<div id="sheet"></div>
<div id="toast"></div>

<script src="demo/demo-data.js"></script>
<script>
(function(){
  "use strict";
  const $ = s => document.querySelector(s);
  const audio = new Audio();
  audio.preload = "metadata";
  let doc=null, segs=[], segEls=[], segStart=[], curSeg=-1, curWordEls=null, rafId=null;
  let chapters=[], chapBySeg={}, curChap=-1;
  let follow=true, userScrollPause=0, isDemo=false, pendingAudioFile=null;
  let sheetKind=null;
  // pages (the location/nav unit) + the cursor used for read<->listen handoff
  let pages=[], pageSeg=[], curPage=-1;     // pages[i] = {seg, start}; pageSeg[i] = its first segment
  let readingSeg=-1;                        // segment at the reading anchor while paused; -1 = no divergence
  let lastUserInput=0, scrollT=0, pendingReadSeg=-1, pausedAt=0;
  let playlist=null, pendingSeek=0, pendingAutoplay=false;   // continuous multi-track book

  const fmt = t => { t=Math.max(0,t|0); const m=(t/60)|0, s=t%60; return m+":"+(s<10?"0":"")+s; };
  const posKey = () => "inn-reader-pos:"+(doc?doc.title:"x");

  // ---------- tiny DOM helpers (no innerHTML; safe against title content) ----------
  function clear(n){ while(n.firstChild) n.removeChild(n.firstChild); }
  function el(tag, props, kids){
    const e=document.createElement(tag);
    if(props) for(const k in props){
      if(k==="class") e.className=props[k];
      else if(k==="text") e.textContent=props[k];
      else if(k==="data"){ for(const d in props[k]) e.dataset[d]=props[k][d]; }
      else if(k.slice(0,2)==="on") e[k]=props[k];
      else e.setAttribute(k, props[k]);
    }
    if(kids!=null) (Array.isArray(kids)?kids:[kids]).forEach(c=>{
      if(c==null) return;
      e.appendChild(typeof c==="string" ? document.createTextNode(c) : c);
    });
    return e;
  }

  // ---------- toast ----------
  let toastT=0;
  function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("on");
    clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("on"),2600); }

  // ---------- schema guard (JS mirror of pipeline/schema.py:validate_doc) ----------
  // Keep in lockstep with the Python validator — it is the single source of truth for
  // the player/aligner contract. Returns null if the doc is loadable, else a short
  // human-readable error. ERROR-level only: WARN-level issues (e.g. non-monotonic
  // segment starts) degrade gracefully in the player, exactly as in schema.py.
  function validateDoc(d, source){
    const tag = source ? source+": " : "";
    const num = x => typeof x==="number" && isFinite(x);   // rejects NaN/Infinity, null, strings, booleans
    if(d===null || typeof d!=="object" || Array.isArray(d)) return tag+"top-level JSON is not an object";
    const errs=[];
    if(typeof d.title!=="string" || !d.title.trim()) errs.push("title missing or empty");
    if(typeof d.audio!=="string") errs.push("audio missing (expected a filename-hint string)");
    let segs = d.segments;
    if(!Array.isArray(segs) || !segs.length){ errs.push("segments missing or empty"); segs=[]; }
    for(let i=0;i<segs.length;i++){
      const s=segs[i];
      if(s===null || typeof s!=="object" || Array.isArray(s)){ errs.push("segment["+i+"] is not an object"); continue; }
      const st=s.start, en=s.end;
      if(!num(st) || st<0) errs.push("segment["+i+"].start invalid");
      if(!num(en)) errs.push("segment["+i+"].end invalid");
      if(num(st) && num(en) && en+1e-6<st) errs.push("segment["+i+"] end < start");
      if(typeof s.text!=="string") errs.push("segment["+i+"].text is not a string");
      const ws=s.words;
      if(ws!=null && !Array.isArray(ws)) errs.push("segment["+i+"].words is not a list");
      else if(Array.isArray(ws)){
        for(let j=0;j<ws.length;j++){
          const w=ws[j];
          if(w===null || typeof w!=="object" || Array.isArray(w) || typeof w.w!=="string"){ errs.push("segment["+i+"].words["+j+"].w invalid"); continue; }
          const ss=w.s, ee=w.e;
          if(!num(ss) || ss<0) errs.push("segment["+i+"].words["+j+"].s invalid");
          if(!num(ee)) errs.push("segment["+i+"].words["+j+"].e invalid");
          if(num(ss) && num(ee) && ee+1e-6<ss) errs.push("segment["+i+"].words["+j+"] e < s");
        }
      }
    }
    const chs=d.chapters;
    if(chs!=null){
      if(!Array.isArray(chs)) errs.push("chapters is not a list");
      else{
        const nseg=segs.length;
        for(let i=0;i<chs.length;i++){
          const c=chs[i];
          if(c===null || typeof c!=="object" || Array.isArray(c)){ errs.push("chapter["+i+"] is not an object"); continue; }
          if(typeof c.title!=="string") errs.push("chapter["+i+"].title is not a string");
          if(!num(c.start) || c.start<0) errs.push("chapter["+i+"].start invalid");
          const sg=c.seg;
          if(sg!=null && (!Number.isInteger(sg) || sg<0 || sg>=nseg)) errs.push("chapter["+i+"].seg "+sg+" out of range 0.."+(nseg-1));
        }
      }
    }
    if(!errs.length) return null;
    return tag+errs.length+" problem(s):\n  • "+errs.slice(0,8).join("\n  • ")+(errs.length>8 ? "\n  • …" : "");
  }

  // ---------- render ----------
  function build(){
    const r=$("#reader"); clear(r);
    r.appendChild(el("div",{id:"docTitle", text:doc.title||"Untitled"}));
    segs=doc.segments; segEls=[]; segStart=[];
    chapters=Array.isArray(doc.chapters)?doc.chapters:[];
    chapBySeg={}; chapters.forEach((c,ci)=>{ if(typeof c.seg==="number") chapBySeg[c.seg]=ci; });
    const frag=document.createDocumentFragment();
    let firstChap=true;
    segs.forEach((sg,i)=>{
      if(i in chapBySeg){
        const ci=chapBySeg[i];
        frag.appendChild(el("div",{class:"chap"+(firstChap?" first":""), data:{ci:String(ci)}, text:chapters[ci].title}));
        firstChap=false;
      }
      const e=el("span",{class:"seg", data:{i:String(i)}, text:sg.text});
      segStart.push(sg.start); segEls.push(e); frag.appendChild(e);
    });
    r.appendChild(frag);
    buildPages();
    wireReader();
  }

  // Bind the persistent #reader once. build() rebuilds its children on every track load / open, but
  // the node (and listeners on it) survive clear(); registering per-build would stack duplicate swipe
  // handlers, so after a few tracks one swipe would fire turnPage() several times and skip pages.
  let readerWired=false;
  function wireReader(){
    if(readerWired) return; readerWired=true;
    const r=$("#reader");
    r.addEventListener("scroll",onReaderScroll,{passive:true});
    r.addEventListener("wheel",()=>{ lastUserInput=Date.now(); },{passive:true});
    r.addEventListener("pointerdown",()=>{ lastUserInput=Date.now(); },{passive:true});
    r.addEventListener("click",onTap);
    let tsx=0,tsy=0,tst=0;
    r.addEventListener("touchstart",e=>{ const t=e.changedTouches[0]; tsx=t.clientX; tsy=t.clientY;
      tst=Date.now(); lastUserInput=tst; },{passive:true});
    r.addEventListener("touchend",e=>{ const t=e.changedTouches[0], dx=t.clientX-tsx, dy=t.clientY-tsy;
      if(Date.now()-tst<600 && Math.abs(dx)>60 && Math.abs(dx)>Math.abs(dy)*1.6) turnPage(dx<0?1:-1); },{passive:true});
  }

  // ---------- pages (location unit; logical scroll anchors over the continuous reader) ----------
  const WORDS_PER_PAGE=280;
  function buildPages(){
    pages=[]; pageSeg=[]; curPage=-1;
    let words=0;
    segs.forEach((sg,i)=>{
      if(i===0 || (i in chapBySeg) || words>=WORDS_PER_PAGE){   // chapter start always begins a page
        pages.push({seg:i, start:sg.start}); pageSeg.push(i); words=0;
      }
      words += (sg.text.match(/\S+/g)||[]).length;
    });
  }
  function pageOf(s){
    let lo=0,hi=pageSeg.length-1,ans=0;
    while(lo<=hi){ const m=(lo+hi)>>1; if(pageSeg[m]<=s){ans=m;lo=m+1;} else hi=m-1; }
    return ans;
  }
  function setPage(p){ if(p===curPage) return; curPage=p; updateTopBar(); }
  function updateTopBar(){
    const base = (curChap>=0 && chapters[curChap]) ? chapters[curChap].title : (doc?doc.title:"");
    const lead = playlist ? ("▸ "+(playlist.idx+1)+"/"+playlist.tracks.length+"  ") : "";
    const pg = (pages.length>1 && curPage>=0) ? ("  ·  p"+(curPage+1)+"/"+pages.length) : "";
    $("#nowChap").textContent = lead + base + pg;
  }
  function segAtAnchor(){   // the segment crossing a line ~1/4 down the reader = what you're reading
    const r=$("#reader"), anchor=r.scrollTop + r.clientHeight*0.25;
    let lo=0,hi=segEls.length-1,ans=0;
    while(lo<=hi){ const m=(lo+hi)>>1; if(segEls[m].offsetTop<=anchor){ans=m;lo=m+1;} else hi=m-1; }
    return ans;
  }
  function onReaderScroll(){
    userScrollPause=Date.now()+2500;        // suspend playback auto-follow briefly (unchanged)
    if(!audio.paused) return;               // only the paused reader feeds the cursor
    clearTimeout(scrollT); scrollT=setTimeout(captureReadingPos,160);
  }
  function captureReadingPos(){
    // capture only on a real reader gesture made *after* the pause — so neither the cold-open
    // restore scroll nor a follow/seek scroll still settling from before the pause can hijack it.
    if(!audio.paused || lastUserInput<=pausedAt) return;
    const i=segAtAnchor();
    if(i<0 || i>=segs.length) return;
    readingSeg=i; setPage(pageOf(i)); save();
  }
  function turnPage(dir){
    if(pages.length<2) return;
    lastUserInput=Date.now();
    const target=Math.max(0,Math.min(pages.length-1,(curPage<0?0:curPage)+dir));
    const el=segEls[pages[target].seg]; if(!el) return;
    $("#reader").scrollTo({top:Math.max(0,el.offsetTop-12), behavior:"smooth"});
    if(audio.paused){ readingSeg=pages[target].seg; save(); }
    setPage(target);
  }

  function onTap(e){
    const w=e.target.closest(".w");
    if(w){ seekTo(parseFloat(w.dataset.s)); return; }
    const ch=e.target.closest(".chap");
    if(ch){ seekTo(chapters[+ch.dataset.ci].start); return; }
    const sg=e.target.closest(".seg");
    if(sg){ seekTo(segs[+sg.dataset.i].start); }
  }
  function seekTo(t){ audio.currentTime=t+0.001; if(audio.paused) audio.play(); }

  // ---------- highlight ----------
  function findSeg(t){
    let lo=0,hi=segStart.length-1,ans=0;
    while(lo<=hi){ const m=(lo+hi)>>1; if(segStart[m]<=t){ans=m;lo=m+1;} else hi=m-1; }
    return ans;
  }
  function findChap(t){
    if(!chapters.length) return -1;
    let lo=0,hi=chapters.length-1,ans=0;
    while(lo<=hi){ const m=(lo+hi)>>1; if(chapters[m].start<=t){ans=m;lo=m+1;} else hi=m-1; }
    return ans;
  }
  function setSeg(i){
    if(i===curSeg) return;
    if(curSeg>=0 && segEls[curSeg]){           // collapse previous active sentence back to plain text
      const p=segEls[curSeg]; p.classList.remove("cur"); p.textContent=segs[curSeg].text;
      if(audio.currentTime>=segs[curSeg].end) p.classList.add("read");
    }
    curSeg=i; curWordEls=null;
    const p=segEls[i]; if(!p) return;
    const sg=segs[i];
    if(sg.words && sg.words.length){          // expand current sentence into word spans
      clear(p);
      const f=document.createDocumentFragment();
      sg.words.forEach(w=>{ f.appendChild(el("span",{class:"w", data:{s:String(w.s), e:String(w.e)}, text:w.w+" "})); });
      p.appendChild(f);
      curWordEls=p.querySelectorAll(".w");
    }
    p.classList.add("cur"); p.classList.remove("read");
    for(let k=0;k<i;k++) segEls[k].classList.add("read");
    if(follow && Date.now()>userScrollPause) p.scrollIntoView({block:"center",behavior:"smooth"});
    setPage(pageOf(i));
  }
  function setWord(t){
    if(!curWordEls) return;
    let active=-1;
    const ws=segs[curSeg].words;
    for(let k=0;k<ws.length;k++){ if(t>=ws[k].s) active=k; else break; }
    // active<0 before the first word (e.g. torch text starting at 8.4s): light nothing,
    // and never index ws[-1]. (k===active already short-circuits; the guard is explicit.)
    for(let k=0;k<curWordEls.length;k++)
      curWordEls[k].classList.toggle("on", active>=0 && k===active && t<=ws[active].e+0.05);
  }
  function setChap(t){
    const ci=findChap(t);
    if(ci===curChap) return;
    curChap=ci;
    updateTopBar();
    updateMetadata();
    if(sheetKind==="chapters") markCurrentChapter();
  }
  function tick(){
    const t=audio.currentTime;
    setSeg(findSeg(t)); setWord(t); setChap(t);
    $("#seek").value = audio.duration? (t/audio.duration*1000):0;
    $("#cur").textContent=fmt(t);
    updatePosition(); checkSleep(t); save();
    if(!audio.paused) rafId=requestAnimationFrame(tick);
  }

  // ---------- Media Session (lock screen / headset) ----------
  function setupMediaSession(){
    if(!("mediaSession" in navigator)) return;
    const ms=navigator.mediaSession;
    const set=(a,fn)=>{ try{ ms.setActionHandler(a,fn); }catch(e){} };
    set("play",()=>resumePlay());
    set("pause",()=>audio.pause());
    set("seekbackward",d=>{ audio.currentTime=Math.max(0,audio.currentTime-((d&&d.seekOffset)||15)); });
    set("seekforward",d=>{ audio.currentTime=Math.min(audio.duration||1e9,audio.currentTime+((d&&d.seekOffset)||15)); });
    set("seekto",d=>{ if(d.fastSeek && "fastSeek" in audio){ audio.fastSeek(d.seekTime); return; } audio.currentTime=d.seekTime; });
    set("previoustrack",()=>{ if(playlist) prevTrack(); else jumpChapter(-1); });
    set("nexttrack",()=>{ if(playlist) nextTrack(); else jumpChapter(1); });
  }
  function updateMetadata(){
    if(!("mediaSession" in navigator) || !("MediaMetadata" in window) || !doc) return;
    const ch=(curChap>=0 && chapters[curChap]) ? chapters[curChap] : null;
    try{ navigator.mediaSession.metadata=new MediaMetadata({
      title: ch ? ch.title : (doc.title||"Inn Reader"),
      artist: doc.title||"Inn Reader", album:"Inn Reader" }); }catch(e){}
  }
  function updatePosition(){
    if(!("mediaSession" in navigator) || !navigator.mediaSession.setPositionState) return;
    if(!audio.duration || !isFinite(audio.duration)) return;
    try{ navigator.mediaSession.setPositionState({ duration:audio.duration,
      playbackRate:audio.playbackRate||1, position:Math.min(audio.currentTime,audio.duration) }); }catch(e){}
  }

  // ---------- chapter jump ----------
  function jumpChapter(dir){
    if(!chapters.length) return;
    const base = curChap<0 ? 0 : curChap;
    let target;
    if(dir<0){ const atStart = curChap>=0 && (audio.currentTime - chapters[curChap].start) < 3;
      target = atStart ? base-1 : base; }   // double-back near a chapter's start = previous chapter
    else target = base+1;
    target=Math.max(0,Math.min(chapters.length-1,target));
    seekTo(chapters[target].start);
  }
  // whole-book chapter skip: crosses tracks via globalChaps (single-file falls back to jumpChapter)
  function skipChapter(dir){
    if(!(playlist && playlist.globalChaps && playlist.globalChaps.length)) return jumpChapter(dir);
    const gc=playlist.globalChaps, ti=playlist.idx, t=audio.currentTime;
    let cur=-1;                                  // current chapter = last one at/before (track, time); gc is track-ordered
    for(let i=0;i<gc.length;i++){
      if(gc[i].trackIdx<ti || (gc[i].trackIdx===ti && gc[i].start<=t+0.01)) cur=i; else break;
    }
    let target;
    if(dir<0){ const atStart = cur>=0 && gc[cur].trackIdx===ti && (t-gc[cur].start)<3;
      target = atStart ? cur-1 : cur; }          // double-back near a chapter's start = previous chapter
    else target = cur+1;
    target=Math.max(0,Math.min(gc.length-1,target));
    const c=gc[target];
    if(c.trackIdx===ti) seekTo(c.start); else loadTrack(c.trackIdx, c.start, true);
  }

  // ---------- persistence (position) ----------
  // One canonical position per doc: {t} for listening precision, {seg} for the reading place.
  // While paused with the reader scrolled ahead, `seg` is the furthest point and wins on restore.
  let lastSave=0;
  function posSeg(){ return (audio.paused && readingSeg>=0) ? readingSeg : curSeg; }
  function save(){ const n=Date.now(); if(n-lastSave<1500) return; lastSave=n;
    try{ localStorage.setItem(posKey(), JSON.stringify({t:audio.currentTime, seg:posSeg()})); }catch(e){}
    if(playlist) savePlaylistPos(); }
  function restore(){
    try{
      const raw=localStorage.getItem(posKey()); if(!raw) return;
      let t=NaN, seg=-1;
      if(raw.charAt(0)==="{"){ const o=JSON.parse(raw); t=+o.t; if(typeof o.seg==="number") seg=o.seg; }
      else { t=parseFloat(raw); }                       // legacy: bare seconds
      if(seg>=0 && seg<segs.length && seg!==findSeg(t)){ // reading place differs from playhead -> resume where you were reading
        audio.currentTime=segs[seg].start; pendingReadSeg=seg;
      } else if(t>0 && t<audio.duration){ audio.currentTime=t; }
    }catch(e){}
  }

  // ---------- session store (IndexedDB) for one-tap resume ----------
  const DB="inn-reader", STORE="session";
  function idb(){ return new Promise((res,rej)=>{ let r; try{ r=indexedDB.open(DB,1); }catch(e){ return rej(e); }
    r.onupgradeneeded=()=>{ if(!r.result.objectStoreNames.contains(STORE)) r.result.createObjectStore(STORE); };
    r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
  function idbSet(k,v){ return idb().then(db=>new Promise((res,rej)=>{
    const tx=db.transaction(STORE,"readwrite"); tx.objectStore(STORE).put(v,k);
    tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error); })); }
  function idbGet(k){ return idb().then(db=>new Promise((res,rej)=>{
    const tx=db.transaction(STORE,"readonly"); const rq=tx.objectStore(STORE).get(k);
    rq.onsuccess=()=>res(rq.result); rq.onerror=()=>rej(rq.error); })); }

  function saveSession(){
    if(isDemo || !doc) return;
    const base={ doc, audioName:(pendingAudioFile?pendingAudioFile.name:""), savedAt:Date.now() };
    const full = pendingAudioFile ? Object.assign({audioBlob:pendingAudioFile}, base) : base;
    idbSet("last", full).catch(()=>idbSet("last", base).catch(()=>{}));  // quota → keep text-only
  }
  function checkResume(){
    idbGet("last").then(rec=>{
      if(!rec || !rec.doc) return;
      const btn=$("#resumeBtn"); $("#resumeName").textContent=rec.doc.title||"last session";
      btn.style.display="flex";
      btn.onclick=()=>{
        doc=rec.doc;
        if(rec.audioBlob){ isDemo=false; pendingAudioFile=rec.audioBlob;   // keep the blob persisted on re-save
          audio.src=URL.createObjectURL(rec.audioBlob); open(); }
        else {            // text-only resume: pre-load sync, ask for just the audio file
          haveSync=true; $("#syncCk").textContent="●"; $("#syncName").textContent=doc.title;
          $("#audioName").textContent="re-select: "+(rec.audioName||"your audio file");
          btn.style.display="none"; toast("Pick the audio file to finish resuming");
        }
      };
    }).catch(()=>{});
  }

  // ---------- display settings (font size) ----------
  const FONT_KEY="inn-reader-font", FMIN=17, FMAX=34, FDEF=25;   // px (≈ the 1.55rem default)
  function fontPx(){ const v=parseInt(localStorage.getItem(FONT_KEY),10); return (v>=FMIN&&v<=FMAX)?v:FDEF; }
  function applyFont(px){ document.documentElement.style.setProperty("--read", px+"px");
    try{ localStorage.setItem(FONT_KEY,String(px)); }catch(e){} }
  function stepFont(d){ applyFont(Math.max(FMIN,Math.min(FMAX,fontPx()+d))); if(sheetKind==="settings") renderSettings(); }

  // ---------- wake lock (keep screen on while playing) ----------
  const WAKE_KEY="inn-reader-wake";
  let wakeLock=null, keepAwake = localStorage.getItem(WAKE_KEY)==="1";
  function acquireWake(){ if(!keepAwake || !("wakeLock" in navigator) || document.hidden) return;
    navigator.wakeLock.request("screen").then(w=>{ wakeLock=w;
      w.addEventListener("release",()=>{ wakeLock=null; }); }).catch(()=>{}); }
  function releaseWake(){ if(wakeLock){ wakeLock.release().catch(()=>{}); wakeLock=null; } }
  function toggleWake(){ keepAwake=!keepAwake; try{ localStorage.setItem(WAKE_KEY, keepAwake?"1":"0"); }catch(e){}
    if(keepAwake && !audio.paused) acquireWake(); else releaseWake();
    if(sheetKind==="settings") renderSettings(); }
  document.addEventListener("visibilitychange",()=>{ if(!document.hidden && !audio.paused) acquireWake(); });

  // ---------- flush the saved position when leaving (throttle would otherwise drop the last move) ----------
  function flushSave(){ if(!doc) return; lastSave=0; save(); }
  window.addEventListener("pagehide", flushSave);
  document.addEventListener("visibilitychange",()=>{ if(document.hidden) flushSave(); });

  // ---------- sleep timer ----------
  let sleepMode="off", sleepAt=0, sleepChapterEnd=Infinity;
  function setSleep(mode){
    sleepMode=mode;
    if(mode==="off"){ sleepAt=0; }
    else if(mode==="chapter"){ const next=chapters[curChap+1];
      sleepChapterEnd = next ? next.start : (audio.duration||Infinity); }
    else { sleepAt=Date.now()+parseInt(mode,10)*60000; }
    if(sheetKind==="settings") renderSettings();
  }
  function checkSleep(t){
    if(sleepMode==="off") return;
    if(sleepMode==="chapter"){ if(t>=sleepChapterEnd-0.05){ audio.pause(); endSleep(); } }
    else if(Date.now()>=sleepAt){ audio.pause(); endSleep(); }
  }
  function endSleep(){ sleepMode="off"; sleepAt=0; toast("Paused — sleep timer"); }
  function sleepLabel(){
    if(sleepMode==="off") return "";
    if(sleepMode==="chapter") return "until chapter end";
    return Math.max(0,Math.ceil((sleepAt-Date.now())/60000))+" min left";
  }

  // ---------- transport ----------
  // The read->listen handoff: if you read ahead while paused, play continues from the reading place.
  function resumePlay(){
    if(readingSeg>=0 && segs[readingSeg] && readingSeg!==findSeg(audio.currentTime))
      audio.currentTime=segs[readingSeg].start+0.001;
    readingSeg=-1;
    audio.play();
  }
  $("#play").onclick=()=>{ if(audio.paused){resumePlay();} else {audio.pause();} };
  $("#back").onclick=()=>{ audio.currentTime=Math.max(0,audio.currentTime-15); };
  $("#fwd").onclick =()=>{ audio.currentTime=Math.min(audio.duration||1e9,audio.currentTime+15); };
  $("#prevChap").onclick=()=>skipChapter(-1);
  $("#nextChap").onclick=()=>skipChapter(1);
  const rates=[0.8,1,1.25,1.5,2], RATE_KEY="inn-reader-rate";
  let ri=(()=>{ const v=parseInt(localStorage.getItem(RATE_KEY),10); return (v>=0&&v<rates.length)?v:1; })();
  function applyRate(){ audio.playbackRate=rates[ri]; $("#rate").textContent=rates[ri]+"×";
    try{ localStorage.setItem(RATE_KEY,String(ri)); }catch(e){} }
  $("#rate").onclick=()=>{ ri=(ri+1)%rates.length; applyRate(); };
  $("#follow").onclick=()=>{ follow=!follow; $("#follow").classList.toggle("act",follow);
    if(follow && segEls[curSeg]) segEls[curSeg].scrollIntoView({block:"center",behavior:"smooth"}); };
  $("#seek").oninput=e=>{ if(audio.duration){ audio.currentTime=e.target.value/1000*audio.duration; } };

  audio.addEventListener("play",()=>{ $("#play").textContent="❚❚";
    if("mediaSession" in navigator) navigator.mediaSession.playbackState="playing";
    acquireWake(); cancelAnimationFrame(rafId); rafId=requestAnimationFrame(tick); });
  audio.addEventListener("pause",()=>{ $("#play").textContent="▶";
    if("mediaSession" in navigator) navigator.mediaSession.playbackState="paused";
    readingSeg=-1; pausedAt=Date.now();  // fresh pause: no divergence until a post-pause reader gesture
    releaseWake(); save(); });
  audio.addEventListener("seeked",()=>{ const t=audio.currentTime; readingSeg=-1;  // explicit audio move
    setSeg(findSeg(t)); setWord(t); setChap(t);
    $("#cur").textContent=fmt(t); updatePosition(); });
  audio.addEventListener("loadedmetadata",()=>{ $("#dur").textContent=fmt(audio.duration);
    if(playlist){ let st=Math.min(pendingSeek||0, (audio.duration||1e9)-0.1);
      if(pendingReadSeg>=0 && pendingReadSeg<segs.length && pendingReadSeg!==findSeg(st))
        st=segs[pendingReadSeg].start;                  // reading place differs from the audio -> resume there
      if(st>0) audio.currentTime=st; if(pendingAutoplay) audio.play().catch(()=>{}); pendingAutoplay=false; }
    else { restore(); }
    const t=audio.currentTime; setSeg(findSeg(t)); setChap(t); $("#cur").textContent=fmt(t); updatePosition();
    if(pendingReadSeg>=0){              // open on the page we were last reading
      const p=pageOf(pendingReadSeg), el=segEls[pages[p].seg];
      setPage(p); if(el) $("#reader").scrollTo({top:Math.max(0,el.offsetTop-12)});
      pendingReadSeg=-1;
    }
    lastSave=0; save();                // persist the freshly-restored position now (no zeroed pre-seek write)
  });
  audio.addEventListener("error",()=>{ if(audio.src) toast("Couldn't load that audio file."); });
  audio.addEventListener("ended",()=>{ if(playlist && playlist.idx+1<playlist.tracks.length) nextTrack(); });

  // ---------- bottom sheet ----------
  function openSheet(kind){ sheetKind=kind; (kind==="chapters"?renderChapters:renderSettings)();
    $("#scrim").classList.add("on"); $("#sheet").classList.add("on"); }
  function closeSheet(){ sheetKind=null; $("#scrim").classList.remove("on"); $("#sheet").classList.remove("on"); }
  $("#scrim").onclick=closeSheet;
  $("#chaptersBtn").onclick=()=>openSheet("chapters");
  $("#settingsBtn").onclick=()=>openSheet("settings");

  function markCurrentChapter(){
    $("#sheet").querySelectorAll(".clist button").forEach((b,i)=>b.classList.toggle("cur",i===curChap));
  }
  function renderChapters(){
    const s=$("#sheet"); clear(s);
    s.appendChild(el("div",{class:"grip"}));
    s.appendChild(el("h2",{text:"Chapters"}));
    if(playlist && playlist.globalChaps.length){     // whole-book menu, jumps across tracks
      const list=el("div",{class:"clist"});
      playlist.globalChaps.forEach(c=>{
        const b=el("button",{}, [ el("span",{class:"ct", text:"trk "+(c.trackIdx+1)}), c.title ]);
        if(c.trackIdx===playlist.idx) b.classList.add("cur");
        b.onclick=()=>{ if(c.trackIdx===playlist.idx) seekTo(c.start); else loadTrack(c.trackIdx, c.start, true); closeSheet(); };
        list.appendChild(b);
      });
      s.appendChild(list); return;
    }
    if(!chapters.length){ s.appendChild(el("p",{class:"empty", text:"No chapter markers in this file."})); return; }
    const list=el("div",{class:"clist"});
    chapters.forEach((c,i)=>{
      const b=el("button",{data:{ci:String(i)}}, [ el("span",{class:"ct", text:fmt(c.start)}), c.title ]);
      b.onclick=()=>{ seekTo(chapters[i].start); closeSheet(); };
      list.appendChild(b);
    });
    s.appendChild(list); markCurrentChapter();
  }
  function chip(label, active, onclick){ const c=el("button",{class:"chip"+(active?" act":""), text:label}); c.onclick=onclick; return c; }
  function srow(main, sub, chips){
    const lab=el("div",{class:"lab"}, sub ? [main, el("small",{text:sub})] : main);
    return el("div",{class:"srow"}, [lab, el("div",{class:"chips"}, chips)]);
  }
  function renderSettings(){
    const s=$("#sheet"); clear(s);
    s.appendChild(el("div",{class:"grip"}));
    s.appendChild(el("h2",{text:"Display & timer"}));
    s.appendChild(srow("Text size", null, [ chip("A−",false,()=>stepFont(-2)), chip("A+",false,()=>stepFont(2)) ]));
    s.appendChild(srow("Keep screen on","while playing", [ chip(keepAwake?"On":"Off", keepAwake, toggleWake) ]));
    const sl=[["off","Off"],["15","15m"],["30","30m"],["45","45m"],["chapter","Chapter"]];
    s.appendChild(srow("Sleep timer", sleepMode!=="off"?sleepLabel():null,
      sl.map(([v,l])=>chip(l, sleepMode===v, ()=>setSleep(v)))));
  }

  // ---------- keyboard (desktop) ----------
  document.addEventListener("keydown",e=>{
    if(!$("#reader").classList.contains("on")) return;
    const tag=(e.target.tagName||"").toLowerCase();
    if(tag==="input"||tag==="textarea") return;
    if(e.key===" "){ e.preventDefault(); $("#play").click(); }
    else if(e.key==="ArrowLeft"){ e.shiftKey ? skipChapter(-1) : $("#back").click(); }
    else if(e.key==="ArrowRight"){ e.shiftKey ? skipChapter(1) : $("#fwd").click(); }
    else if(e.key==="PageDown" && pages.length>1){ e.preventDefault(); turnPage(1); }
    else if(e.key==="PageUp" && pages.length>1){ e.preventDefault(); turnPage(-1); }
    else if(e.key==="Escape" && sheetKind) closeSheet();
  });

  // ---------- continuous book (multi-track playlist) ----------
  function parseJsonFile(file){ return new Promise((res,rej)=>{ const fr=new FileReader();
    fr.onload=()=>{ try{ res(JSON.parse(fr.result)); }catch(err){ rej(err); } };
    fr.onerror=()=>rej(fr.error); fr.readAsText(file); }); }
  const trackNo = name => { const m=/(\d+)/.exec(name||""); return m ? m[1].padStart(4,"0") : (name||""); };

  function buildPlaylist(files){
    return new Promise(resolve=>{
      const audioByNo={}, audioByName={}, syncByNo={}, syncByName={};
      let manifestFile=null;
      Array.from(files).forEach(f=>{
        const n=f.name.toLowerCase();
        if(n==="manifest.json"){ manifestFile=f; }
        else if(/\.(mp3|m4a|m4b|aac|wav|ogg|opus|flac)$/.test(n)){ audioByNo[trackNo(f.name)]=f; audioByName[f.name]=f; }
        else if(/\.json$/.test(n)){ syncByNo[trackNo(f.name)]=f; syncByName[f.name]=f; }
      });
      const finish=(book,tracks)=>{
        const pl={book:book||"Book", tracks, idx:0, globalChaps:[]};
        tracks.forEach((t,ti)=>{ if(Array.isArray(t.chapters)) t.chapters.forEach(c=>{
          if(c && typeof c.start==="number") pl.globalChaps.push({title:c.title, trackIdx:ti, start:c.start}); }); });
        playlist=pl; resolve(tracks.length);
      };
      const pairByNumber=()=>{
        const nos=Object.keys(syncByNo).filter(no=>audioByNo[no]).sort();
        finish("Book", nos.map(no=>({no, audioFile:audioByNo[no], syncFile:syncByNo[no], chapters:null})));
      };
      if(manifestFile){
        parseJsonFile(manifestFile).then(man=>{
          if(!man || !Array.isArray(man.tracks)) return pairByNumber();
          const tracks=[];
          man.tracks.forEach(t=>{
            const a=audioByName[t.audio]||audioByNo[trackNo(t.audio||t.file)];
            const s=syncByName[t.file]||syncByNo[trackNo(t.file||t.audio)];
            if(a&&s) tracks.push({no:t.track||trackNo(t.file), audioFile:a, syncFile:s,
                                  chapters:Array.isArray(t.chapters)?t.chapters:null});
          });
          tracks.length ? finish(man.book, tracks) : pairByNumber();
        }).catch(pairByNumber);
      } else pairByNumber();
    });
  }

  // A track's sync/audio can be a local File, a direct URL, or a Dropbox PATH. Dropbox temporary links
  // expire (~4h), so we store the PATH and resolve a fresh link lazily WHEN the track loads -- resolving
  // all of a 45h book up front would dead-link the later tracks before playback reaches them.
  function loadSync(t){
    if(t.syncPath) return dbxLink(t.syncPath).then(u=>fetch(u)).then(r=>{ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); });
    if(t.syncUrl)  return fetch(t.syncUrl).then(r=>{ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); });
    return parseJsonFile(t.syncFile);
  }
  function trackAudioSrc(t){                  // fresh src each load (Dropbox links are temporary)
    if(t.audioPath) return dbxLink(t.audioPath);
    if(t.audioUrl)  return Promise.resolve(t.audioUrl);
    return Promise.resolve(curObjUrl=URL.createObjectURL(t.audioFile));
  }
  const trackLabel = t => t.syncFile ? t.syncFile.name : (t.name || ("track "+(t.no||"")));
  let loadToken=0, curObjUrl=null;
  function loadTrack(idx, seekT, autoplay){
    if(!playlist || idx<0 || idx>=playlist.tracks.length) return;
    const token=++loadToken;                 // guard against out-of-order async loads
    playlist.idx=idx;
    const t=playlist.tracks[idx]; t._retried=false;   // allow one expired-link retry per load (see audio 'error')
    loadSync(t).then(d=>{
      if(token!==loadToken) return;           // a newer loadTrack superseded this one
      const bad=validateDoc(d, trackLabel(t));
      if(bad){ toast("Skipped "+trackLabel(t)+" — malformed sync"); console.warn("validateDoc:", bad); return; }
      doc=d; isDemo=false; pendingAudioFile=t.audioFile||null;
      pendingSeek=Math.max(0, seekT||0); pendingAutoplay=!!autoplay;
      build(); curSeg=-1; curChap=-2; readingSeg=-1;   // -2 (not -1) so setChap always re-runs, even on chapterless tracks
      if(curObjUrl){ URL.revokeObjectURL(curObjUrl); curObjUrl=null; }   // free the previous track's blob URL
      setSeg(0); setChap(0);
      return trackAudioSrc(t).then(src=>{ if(token===loadToken) audio.src=src; });  // -> loadedmetadata seeks/autoplays
    }).catch(()=>{ if(token===loadToken) toast("Couldn't load "+trackLabel(t)); });
  }
  function prevTrack(){ if(playlist) loadTrack(audio.currentTime<3 ? playlist.idx-1 : playlist.idx, 0, true); }
  function nextTrack(){ if(playlist) loadTrack(playlist.idx+1, 0, true); }

  function plKey(book){ return "inn-reader-book:"+book; }
  function savePlaylistPos(){ if(!playlist) return;
    try{ localStorage.setItem(plKey(playlist.book),
      JSON.stringify({idx:playlist.idx, t:audio.currentTime||0, seg:posSeg(), n:playlist.tracks.length, ts:Date.now()})); }catch(e){}
    dbxSchedulePosSave(); }   // also push to the user's Dropbox if this is a Dropbox-loaded book (cross-device place)
  function loadPlaylistPos(book){ try{ return JSON.parse(localStorage.getItem(plKey(book))||"null"); }catch(e){ return null; } }

  function startBook(files){
    dbxBook = null;                 // local-folder book -> not synced to Dropbox
    buildPlaylist(files).then(n=>{
      if(!n){ toast("No matching track + sync files in that selection."); return; }
      showReaderUI();
      const saved=loadPlaylistPos(playlist.book);
      const startIdx=(saved && saved.idx>=0 && saved.idx<playlist.tracks.length) ? saved.idx : 0;
      if(saved && typeof saved.seg==="number") pendingReadSeg=saved.seg;   // resume on the page last read
      loadTrack(startIdx, saved?saved.t:0, false);
      if(saved && (saved.idx>0 || (saved.t||0)>5)) toast("Resumed — track "+(startIdx+1)+" of "+playlist.tracks.length);
      else toast(playlist.tracks.length+" tracks · reads continuously");
    });
  }

  // ---------- loading ----------
  let haveAudio=false, haveSync=false;
  function maybeReady(){ if(haveAudio && haveSync) $("#startBtn").style.display="flex"; }
  $("#audioIn").addEventListener("change",e=>{ const f=e.target.files[0]; if(!f)return;
    pendingAudioFile=f; isDemo=false; audio.src=URL.createObjectURL(f); haveAudio=true;
    $("#audioCk").textContent="●"; $("#audioName").textContent=f.name; maybeReady();
    if(haveSync && doc) open();   // text-only resume path: sync already loaded, just needed audio
  });
  $("#syncIn").addEventListener("change",e=>{ const f=e.target.files[0]; if(!f)return;
    const fr=new FileReader(); fr.onload=()=>{ try{ doc=JSON.parse(fr.result); haveSync=true;
      $("#syncCk").textContent="●"; $("#syncName").textContent=f.name; maybeReady(); }
      catch(err){ alert("Could not read that JSON: "+err.message); } }; fr.readAsText(f); });
  $("#startBtn").onclick=open;
  $("#bookIn").addEventListener("change",e=>{ const files=e.target.files; if(files && files.length) startBook(files); });
  $("#tryDemo").onclick=()=>{ if(!window.DEMO){ alert("Demo data missing."); return; }
    isDemo=true; doc=window.DEMO.align; audio.src=window.DEMO.audioDataUri; open(); };

  function showReaderUI(){
    applyFont(fontPx()); applyRate(); setupMediaSession();
    $("#load").style.display="none";
    $("#top").classList.add("on"); $("#reader").classList.add("on"); $("#bar").classList.add("on");
  }
  function open(){            // single-file (or demo / resume) entry
    const bad=validateDoc(doc, isDemo?"demo data":"this read-along file");
    if(bad){ alert("This read-along file can't be played:\n\n"+bad); return; }
    playlist=null; dbxBook=null;
    build(); showReaderUI(); updateMetadata();
    setSeg(0); setChap(0);
    saveSession();
  }

  // ---------- Dropbox loader (App-folder scope, OAuth 2 PKCE, all client-side) ----------
  // The app key is a PUBLIC client_id (not a secret). Tokens are minted in THIS browser and kept in
  // localStorage only — never committed. "App folder" access means a token can read ONLY /Apps/Inn Reader/.
  const DBX = { key: localStorage.getItem("dbx-appkey") || "vk8flkkycqe19fw",
                redirect: location.origin + location.pathname, tok: null, exp: 0 };
  const b64url = buf => btoa(String.fromCharCode(...new Uint8Array(buf)))
                          .replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
  const dbxForm = o => Object.entries(o).map(([k,v]) => encodeURIComponent(k)+"="+encodeURIComponent(v)).join("&");
  async function dbxAuthStart(){
    const v = b64url(crypto.getRandomValues(new Uint8Array(48)));
    const c = b64url(await crypto.subtle.digest("SHA-256", new TextEncoder().encode(v)));
    sessionStorage.setItem("dbx-verifier", v); sessionStorage.setItem("dbx-pending", "1");
    location.href = "https://www.dropbox.com/oauth2/authorize?" + dbxForm({
      client_id: DBX.key, response_type: "code", code_challenge: c, code_challenge_method: "S256",
      token_access_type: "offline", redirect_uri: DBX.redirect });
  }
  async function dbxTokenPost(body){
    const r = await fetch("https://api.dropboxapi.com/oauth2/token", { method:"POST",
      headers:{"Content-Type":"application/x-www-form-urlencoded"}, body: dbxForm(body) });
    if(!r.ok) throw new Error("auth "+r.status+" "+(await r.text()).slice(0,120));
    return r.json();
  }
  async function dbxExchange(code){
    const d = await dbxTokenPost({ code, grant_type:"authorization_code",
      code_verifier: sessionStorage.getItem("dbx-verifier"), client_id: DBX.key, redirect_uri: DBX.redirect });
    if(d.refresh_token) localStorage.setItem("dbx-refresh", d.refresh_token);
    DBX.tok = d.access_token; DBX.exp = Date.now() + (d.expires_in-60)*1000;
    sessionStorage.removeItem("dbx-verifier");
  }
  async function dbxToken(){
    if(DBX.tok && Date.now() < DBX.exp) return DBX.tok;
    const rt = localStorage.getItem("dbx-refresh"); if(!rt) throw new Error("not connected");
    let d; try{ d = await dbxTokenPost({ grant_type:"refresh_token", refresh_token: rt, client_id: DBX.key }); }
    catch(e){ localStorage.removeItem("dbx-refresh"); throw e; }
    DBX.tok = d.access_token; DBX.exp = Date.now() + (d.expires_in-60)*1000; return DBX.tok;
  }
  async function dbxRpc(path, body){
    const t = await dbxToken();
    const r = await fetch("https://api.dropboxapi.com/2/"+path, { method:"POST",
      headers:{"Authorization":"Bearer "+t, "Content-Type":"application/json"}, body: JSON.stringify(body) });
    if(!r.ok) throw new Error(path+" "+r.status+" "+(await r.text()).slice(0,120));
    return r.json();
  }
  async function dbxList(folder){
    let res = await dbxRpc("files/list_folder", { path: folder, recursive: false });
    let e = res.entries;
    while(res.has_more){ res = await dbxRpc("files/list_folder/continue", { cursor: res.cursor }); e = e.concat(res.entries); }
    return e;
  }
  const dbxLink = async path => (await dbxRpc("files/get_temporary_link", { path })).link;  // streamable, CORS, ~4h

  // ---- cross-device place: a tiny positions.json in the app folder, synced by Dropbox ----
  // dbxBook = name of the currently-open Dropbox book (null otherwise). Each user's positions live in
  // THEIR own app folder, so places are naturally per-user. Needs the files.content.write scope.
  let dbxBook = null, dbxPosCache = {}, dbxPosTimer = null, dbxPosDirty = false;
  const DBX_POS_PATH = "/positions.json";
  async function dbxContent(endpoint, arg, body){            // Dropbox content endpoint (download/upload)
    const t = await dbxToken();
    const h = { "Authorization":"Bearer "+t, "Dropbox-API-Arg": JSON.stringify(arg) };
    if(body !== undefined) h["Content-Type"] = "application/octet-stream";
    return fetch("https://content.dropboxapi.com/2/"+endpoint, { method:"POST", headers:h, body });
  }
  async function dbxLoadPositions(){
    try{ const r = await dbxContent("files/download", { path: DBX_POS_PATH });
         return r.ok ? await r.json() : {}; }            // 409 = not created yet -> empty
    catch(e){ return {}; }
  }
  async function dbxUploadPositions(){
    try{ const r = await dbxContent("files/upload", { path: DBX_POS_PATH, mode:"overwrite", mute:true },
                                    JSON.stringify(dbxPosCache));
         if(r.ok) dbxPosDirty = false; }      // ONLY clear on 2xx; a 403 (no write scope) etc. stays dirty -> retries
    catch(e){ /* keep dirty; a later save/flush retries */ }
  }
  function dbxSchedulePosSave(){                            // called from savePlaylistPos()
    if(!dbxBook || !playlist) return;
    dbxPosCache[dbxBook] = { idx:playlist.idx, t:audio.currentTime||0, seg:posSeg(),
                             n:playlist.tracks.length, ts:Date.now() };
    dbxPosDirty = true;
    if(!dbxPosTimer) dbxPosTimer = setTimeout(()=>{ dbxPosTimer=null; if(dbxPosDirty) dbxUploadPositions(); }, 8000);
  }
  function dbxFlushPos(){ if(dbxBook && dbxPosDirty){ if(dbxPosTimer){ clearTimeout(dbxPosTimer); dbxPosTimer=null; } dbxUploadPositions(); } }
  document.addEventListener("visibilitychange", ()=>{ if(document.visibilityState==="hidden") dbxFlushPos(); });
  window.addEventListener("pagehide", dbxFlushPos);

  audio.addEventListener("error", () => {        // a Dropbox temporary link expired (e.g. paused past ~4h)
    const t = playlist && playlist.tracks[playlist.idx];
    if(!t || !t.audioPath || t._retried) return;          // only Dropbox-streamed tracks, once per load
    t._retried = true;
    const at = audio.currentTime || 0, was = !audio.paused;
    dbxLink(t.audioPath).then(src => { audio.src = src;   // re-resolve a fresh link and resume in place
      audio.addEventListener("loadedmetadata", function once(){ audio.removeEventListener("loadedmetadata", once);
        try{ audio.currentTime = at; }catch(e){} if(was) audio.play().catch(()=>{}); }, { once:true });
    }).catch(()=>{});
  });

  const dbxPick = $("#dbxPicker");
  const esc = s => String(s==null?"":s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  const dbxMsg = html => { dbxPick.style.display="flex"; dbxPick.innerHTML = html; };   // callers MUST esc() any dynamic (Dropbox-controlled) text
  async function dbxBrowse(){
    try{
      dbxMsg("<small>Loading your Dropbox books…</small>");
      const folders = (await dbxList("")).filter(e => e[".tag"]==="folder");
      if(!folders.length){ dbxMsg("<small>No book folders in /Apps/Inn&nbsp;Reader/. Put a book's files in a subfolder there.</small>"); return; }
      dbxPick.innerHTML = "<small>Pick a book:</small>";
      folders.forEach(f => { const b=document.createElement("button"); b.className="btn";
        b.textContent="📖 "+f.name; b.onclick=()=>dbxOpenBook(f.path_lower, f.name); dbxPick.appendChild(b); });
    }catch(e){ dbxMsg("<small>Dropbox error: "+esc(e.message)+"</small>"); }
  }
  async function dbxOpenBook(folder, name){
    try{
      dbxMsg("<small>Opening “"+esc(name)+"” — fetching links…</small>");
      const entries = await dbxList(folder), byName = {};
      entries.forEach(e => { if(e[".tag"]==="file") byName[e.name.toLowerCase()] = e.path_lower; });
      let tracks = [], book = name;
      if(byName["manifest.json"]){
        const man = await fetch(await dbxLink(byName["manifest.json"])).then(r=>r.json());
        book = man.book || name;
        for(const t of (man.tracks||[])){
          const ap = byName[(t.audio||"").toLowerCase()], sp = byName[(t.file||"").toLowerCase()];
          if(ap && sp) tracks.push({ no:t.track, name:t.audio, chapters:Array.isArray(t.chapters)?t.chapters:null,
                                     audioPath: ap, syncPath: sp });   // resolved lazily per track (links expire)
        }
      } else {                                   // no manifest: pair audio + alignNN.json by number
        const A={}, S={};
        entries.forEach(e => { if(e[".tag"]!=="file") return; const n=e.name.toLowerCase();
          if(/\.(mp3|m4a|m4b|aac|wav|ogg|opus|flac)$/.test(n)) A[trackNo(e.name)]=e.path_lower;
          else if(/\.json$/.test(n)) S[trackNo(e.name)]=e.path_lower; });
        for(const no of Object.keys(S).filter(k=>A[k]).sort())
          tracks.push({ no, audioPath: A[no], syncPath: S[no], chapters:null });
      }
      if(!tracks.length){ dbxMsg("<small>No matching audio + sync files in “"+esc(name)+"”.</small>"); return; }
      const pl = { book: book||"Book", tracks, idx:0, globalChaps:[] };
      tracks.forEach((t,ti)=>{ if(Array.isArray(t.chapters)) t.chapters.forEach(c=>{
        if(c && typeof c.start==="number") pl.globalChaps.push({ title:c.title, trackIdx:ti, start:c.start }); }); });
      playlist = pl; dbxBook = pl.book; showReaderUI();
      dbxPosCache = await dbxLoadPositions();              // latest place from ANY of this user's devices
      const dP = dbxPosCache[pl.book], lP = loadPlaylistPos(pl.book);
      const saved = (dP && (!lP || (dP.ts||0) >= (lP.ts||0))) ? dP : lP;   // resume at the newer of Dropbox vs local
      const startIdx = (saved && saved.idx>=0 && saved.idx<tracks.length) ? saved.idx : 0;
      if(saved && typeof saved.seg==="number") pendingReadSeg = saved.seg;
      loadTrack(startIdx, saved?saved.t:0, false);
      toast(tracks.length+" tracks · streaming from Dropbox" + (dP ? " · resumed your place" : ""));
    }catch(e){ dbxMsg("<small>Couldn't open “"+esc(name)+"”: "+esc(e.message)+"</small>"); }
  }
  $("#dbxBtn").onclick = async () => {
    try {
      dbxMsg("<small>Connecting to Dropbox…</small>");      // immediate feedback so a click is never silent
      if(localStorage.getItem("dbx-refresh")) await dbxBrowse();
      else await dbxAuthStart();                            // -> redirects to Dropbox (or throws, caught below)
    } catch(e){ dbxMsg("<small>Dropbox error: "+esc((e && e.message) || e)+"</small>"); }
  };
  (function(){                                  // complete the OAuth redirect on return
    const p = new URLSearchParams(location.search);
    if(p.get("code") && sessionStorage.getItem("dbx-verifier")){
      dbxExchange(p.get("code")).then(()=>{ history.replaceState(null,"",location.pathname);
        if(sessionStorage.getItem("dbx-pending")){ sessionStorage.removeItem("dbx-pending"); dbxBrowse(); } })
        .catch(e=>{ history.replaceState(null,"",location.pathname); alert("Dropbox sign-in failed: "+e.message); });
    } else if(p.get("error")){ history.replaceState(null,"",location.pathname); }
  })();

  checkResume();   // offer resume on first paint
})();
</script>
</body>
</html>
